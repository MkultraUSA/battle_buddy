<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Battle Buddy – Morale Patch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700;900&display=swap');

  :root {
    --neon-cyan: #00ffe7;
    --neon-pink: #ff2d78;
    --neon-yellow: #ffe600;
    --neon-green: #39ff14;
    --dark: #080c10;
    --mid: #111820;
    --panel: #0d1520;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(0,255,231,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(255,45,120,0.06) 0%, transparent 60%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 48px;
    font-family: 'Press Start 2P', monospace;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .stage {
    display: flex;
    gap: 64px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .patch-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .tag {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--neon-cyan);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px var(--neon-cyan);
    opacity: 0.7;
  }

  /* Glitch animation */
  @keyframes glitch {
    0%, 92%, 100% { transform: translate(0); clip-path: none; }
    93% { transform: translate(-2px, 1px); clip-path: inset(20% 0 50% 0); }
    94% { transform: translate(2px, -1px); clip-path: inset(60% 0 10% 0); }
    95% { transform: translate(0); clip-path: none; }
    96% { transform: translate(-1px, 2px); clip-path: inset(40% 0 30% 0); }
    97% { transform: translate(0); clip-path: none; }
  }

  @keyframes scanpulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @keyframes hpblink {
    0%, 80%, 100% { opacity: 1; }
    85% { opacity: 0.3; }
    90% { opacity: 1; }
    95% { opacity: 0.3; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }

  @keyframes neonPulse {
    0%, 100% { filter: drop-shadow(0 0 6px var(--neon-cyan)) drop-shadow(0 0 12px var(--neon-cyan)); }
    50% { filter: drop-shadow(0 0 12px var(--neon-cyan)) drop-shadow(0 0 24px var(--neon-cyan)) drop-shadow(0 0 40px var(--neon-cyan)); }
  }

  @keyframes neonPink {
    0%, 100% { filter: drop-shadow(0 0 6px var(--neon-pink)) drop-shadow(0 0 12px var(--neon-pink)); }
    50% { filter: drop-shadow(0 0 12px var(--neon-pink)) drop-shadow(0 0 24px var(--neon-pink)); }
  }

  .patch-main {
    animation: float 4s ease-in-out infinite;
  }

  .neon-glow-cyan {
    animation: neonPulse 2.5s ease-in-out infinite;
  }

  .neon-glow-pink {
    animation: neonPink 2s ease-in-out infinite;
  }

  .glitch-text {
    animation: glitch 6s infinite;
  }

  .hp-bar {
    animation: hpblink 4s infinite;
  }

</style>
</head>
<body>

<div class="stage">

  <!-- MAIN PATCH -->
  <div class="patch-container">
    <div class="patch-main">
      <svg width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Embroidery texture -->
          <filter id="emb" x="-5%" y="-5%" width="110%" height="110%">
            <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" seed="3" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
          </filter>

          <!-- Neon glow -->
          <filter id="glow-cyan">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-pink">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-yellow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="pixel-rough">
            <feTurbulence type="turbulence" baseFrequency="0.65" numOctaves="2" seed="11" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="0.8"/>
          </filter>

          <!-- Background grid pattern -->
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00ffe7" stroke-width="0.3" opacity="0.15"/>
          </pattern>

          <!-- Scanline pattern -->
          <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
            <rect width="1" height="2" fill="rgba(0,0,0,0.2)"/>
          </pattern>

            <stop offset="100%" stop-color="#00ffe7"/>

            <stop offset="70%" stop-color="#ffe600"/>
            <stop offset="100%" stop-color="#39ff14"/>

            <stop offset="0%" stop-color="#ff2d78"/>
            <stop offset="100%" stop-color="#ff8800"/>
          </linearGradient>
